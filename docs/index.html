<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PQC Migration Framework Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Post-Quantum Cryptographic Migration blueprints, roadmaps, and secure sockets SDK documentation.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Stable dark Simple theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <!-- Math equations styling -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css"/>
  
  <style>
    :root {
      --theme-color: #2563eb;
    }
    .markdown-section {
      max-width: 850px;
      padding: 30px 45px 40px;
    }
  </style>
</head>
<body>
  <div id="app">Loading documentation portal...</div>
  <script>
    window.$docsify = {
      name: 'PQC Migration SDK',
      repo: 'ItsMeVikashKumarSingh/pqc-migration-framework',
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: 'README.md',
      themeColor: '#2563eb',
      // Enable Katex Math renderer configs
      katex: {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false }
        ]
      }
    }
  </script>
  
  <!-- Docsify Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- KaTeX Math engine -->
  <script src="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
  
  <!-- Mermaid diagrams engine -->
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false });
  </script>
</body>
</html>
